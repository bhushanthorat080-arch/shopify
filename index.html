<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>Gzirvy Storefront | Headless Shopify Shop</title>
  <meta name="description" content="A super-fast, responsive headless commerce store powered by Shopify Storefront API, HTML5, CSS3, and ES6 modules.">
  <meta name="keywords" content="headless, shopify, storefront, graphql, ecommerce, fast loading, custom shop">
  <meta name="author" content="Gzirvy Commerce">

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gzirvy Storefront | Headless Shopify Shop">
  <meta property="og:description" content="A super-fast, responsive headless commerce store powered by Shopify Storefront API.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200&auto=format&fit=crop">

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%2232%22 height=%2232%22><text y=%2224%22 font-size=%2224%22>🛍️</text></svg>">

  <!-- Premium Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main Styling -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header Section (Dynamic) -->
  <header id="site-header" class="site-header"></header>

  <!-- Page views injector -->
  <main id="app-content" class="app-main-content">
    <!-- Initial Loading State -->
    <div class="page-loader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Footer Section (Dynamic) -->
  <div id="site-footer-container"></div>

  <!-- Entry Script (As Module) -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
